[workspace]
authors = ["MatteoGuglielmi-tech <matteo.guglielmi.ma.gu@gmail.com>"]
channels = ["conda-forge"]
name = "VuLLM"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.13.11,<3.14"
pandas = ">=3.0.0,<4"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"
python-dotenv = ">=1.2.1,<2"
scikit-learn = ">=1.8.0,<2"
jsonlines = ">=4.0.0,<5"
graphviz = ">=14.1.1,<15"
plotly = ">=6.5.2,<7"
optuna = ">=4.6.0,<5"
python-telegram-bot = ">=22.5,<23"
outlines = ">=1.2.4,<2"
matplotlib-venn = ">=1.1.2,<2"

[pypi-dependencies]
tiktoken = ">=0.12.0, <0.13"
openai = ">=2.15.0, <3"
rich = ">=14.2.0, <15"
kaleido = ">=1.2.0, <2"
dataframe-image = ">=0.2.7, <0.3"
flawfinder = ">=2.0.19, <3"

# [feature.dev.dependencies]
# black = "*"

[target.linux-64.pypi-dependencies]
unsloth = ">=2026.1.3, <2027"
liger-kernel = ">=0.6.4, <0.7"
wandb = ">=0.24.0, <0.25"
weave = ">=0.52.25, <0.53"
trl = ">=0.24.0, <0.25"
deepspeed = ">=0.18.4, <0.19"

[feature.dev.dependencies]
debugpy = ">=1.8.18,<2"
tk = ">=8.6.13,<9"

[environments]
dev = { features = ["dev"], solve-group = "default" }

[pypi-options]
# no-build-isolation = ["flash-attn"]
