[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tree-sitter-extended-c"
version = "0.0.1"
authors = [
  { name="Matteo Guglielmi", email="matteo.guglielmi.ma.gu@gmail.com" }
]
description = "Extended Tree-sitter grammar for C with case ranges"
license = "MIT"
requires-python = ">=3.11"
dependencies = [ "tree-sitter>=0.25.1", "setuptools" ]

[tool.setuptools.packages.find]
where = ["src"]
